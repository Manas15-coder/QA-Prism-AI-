<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>QA Prism AI</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="container">

    <div class="hero-section">

        <h1>QA Prism AI ⭐</h1>

        <p class="tagline">
            AI-Powered PRD Requirement Analysis Agent
        </p>

    </div>

    <div class="upload-card">

        <form
                method="post"
                action="/analyze"
                enctype="multipart/form-data"
                id="analysisForm">

            <div class="mb-4">

                <label class="form-label">

                    Upload PRD PDF

                </label>

                <input
                        type="file"
                        name="file"
                        id="prdFile"
                        class="form-control"
                        accept=".pdf"
                        required>

            </div>

            <div
                    id="fileName"
                    class="selected-file">

                No file selected

            </div>

            <button
                    type="submit"
                    id="analyzeBtn"
                    class="btn btn-primary w-100">

                Analyze PRD

            </button>

        </form>

        <!-- Loading Area -->

        <div
                id="loadingSection"
                class="loading-section">

            <div
                    class="spinner-border text-primary"
                    role="status">

                <span class="visually-hidden">
                    Loading...
                </span>

            </div>

            <h5 class="mt-3">

                QA Prism AI Working...

            </h5>

            <p id="statusText">

                Uploading PRD...

            </p>

        </div>

    </div>

</div>

<script src="/js/app.js"></script>

</body>

</html>
